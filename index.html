<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | My Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #1c1c1c;
    color: white;
}

/* Navigation */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    backdrop-filter: blur(10px);
    background: rgba(30, 30, 30, 0.7);
    text-align: center;
    padding: 15px 0;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover {
    color: #ff69b4;
}

/* Sections */
section {
    padding: 150px 20px 50px 20px;
    text-align: center;
}

/* Home Section */
#home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffb6c1, #ff69b4);
    min-height: 100vh;
    color: white;
}

/* Glass Card */
.home-card {
    background: rgba(255, 255, 255, 0.15);
    padding: 35px 50px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    text-align: center;
}

/* Profile Image */
#home img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 3px solid #ffc0cb;
    margin-bottom: 20px;
    object-fit: cover;
}

/* Text */
#home h1 {
    font-size: 45px;
    margin-bottom: 10px;
    color: #fff0f5;
}

#home p {
    font-size: 18px;
    margin-bottom: 0;
    color: #ffe4e1;
}

@media (max-width: 768px) {
    #home h1 {
        font-size: 35px;
    }
    .home-card {
        padding: 25px 30px;
    }
}
</style>
</head>

<body>

<nav>
    <a href="home.html">Home</a>
    <a href="projects.html">My Projects</a>
    <a href="about.html">About Me</a>
    <a href="contacts.html">Contacts</a>
</nav>

<section id="home">
    <div class="home-card">
        <img src="my pic.jpg" alt="my pic">
        <h1>Hello, I'm Jane</h1>
        <p> WEB SYSTEM AND TECHNOLOGY </p>
    </div>
</section>

</body>
</html>
